name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps needed for offline tests
        run: pip install networkx
      - name: Run offline unit tests (no LLM/GPU)
        run: python tests/test_core.py
